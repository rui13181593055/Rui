    <rect x="184" y="348" width="912" height="72" rx="18" fill="#0B1626" stroke="#26364D"/>
    <text x="218" y="378" fill="#E2E8F0" font-size="18" font-weight="800">Newly added capability families</text>
    <text x="218" y="406" fill="#CBD5E1" font-size="16">token-frugal skill authoring  |  decision-record architecture  |  agent efficiency audit</text>
